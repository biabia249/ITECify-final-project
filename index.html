<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {background:#1e1e1e;color:#dcdcdc;font-family:Consolas,monospace;padding:20px;}
textarea{width:100%;height:100px;background:#252526;color:#dcdcdc;border:1px solid #333;border-radius:6px;padding:10px;font-family:Consolas,monospace;}
button{margin-top:10px;background:#007acc;color:white;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;}
pre{background:#1e1e1e;border-radius:8px;padding:15px;font-size:14px;white-space:pre-wrap;word-wrap:break-word;margin:20px 0;}
.keyword{color:#dcdcaa;}
.string{color:#ce9178;}
.number{color:#b5cea8;}
.comment{color:#6a9955;font-style:italic;}
.function{color:#d16969;}
</style>
</head>
<body>
<h3>Type fake JS code:</h3>
<textarea id="input" placeholder="Type your code here..."></textarea>
<button onclick="postText()">Post</button>
<div id="output"></div>

<script>
// --- regex-based syntax highlighter ---
function syntaxHighlight(text) {
  // Escape HTML first
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // Order matters: comments, strings, keywords, numbers, functions
  // Comments
  text = text.replace(/(\/\/[^\n]*)/g,
                      '<span class="comment">$1</span>');
  // Strings
  text = text.replace(/("[^"\\]*(?:\\.[^"\\]*)*"|'[^'\\]*(?:\\.[^'\\]*)*')/g,
                      '<span class="string">$1</span>');
  // Keywords
  text = text.replace(/\b(function|return|let|const|var|if|else|for|while|class|new|this)\b/g,
                      '<span class="keyword">$1</span>');
  // Numbers
  text = text.replace(/\b(\d+(?:\.\d+)?)\b/g,
                      '<span class="number">$1</span>');
  // Function names (after keyword coloring)
  text = text.replace(/(\b[a-zA-Z_]\w*)(?=\s*\()/g,
                      '<span class="function">$1</span>');

  return text;
}

// --- post printed code block ---
function postText() {
  const input = document.getElementById("input");
  const output = document.getElementById("output");
  const code = input.value;
  if (!code.trim()) return;

  const pre = document.createElement("pre");
  pre.innerHTML = syntaxHighlight(code);
  output.appendChild(pre);
  input.value = "";
}
</script>
</body>
</html>
