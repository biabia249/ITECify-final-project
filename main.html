<!DOCTYPE html>
<html>
<head>
  <title>ITECify</title>
  <style>
    * { box-sizing: border-box; }
    body {
      padding:0 10px;
      background-color: #77726f;
      overflow-y: hidden; 
      font-family: sans-serif;
    }
    .main { display: flex; gap: 20px; align-items: flex-start; }
    .left { display: flex; flex-direction: column; flex: 3; height: 98vh; }
    .icon { display: flex; justify-content: center; }
    .workwindow {
      background: #9dabb4; 
      border-radius: 25px;
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #output { overflow-y: auto; flex: 1; min-height: 0; }
    #output::-webkit-scrollbar { width: 0.5em; }
    #output::-webkit-scrollbar-track { background: #495e6f; }
    #output::-webkit-scrollbar-thumb { background: #758a9b; }
    #output pre {
      background: #2c3943;
      color: #ece6e3;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    pre + button { font-size: 0.75rem; margin-top: -8px; margin-bottom: 10px; display: block; }
    .comment { color: #6a9955; }
    .string { color: #ce9178; }
    .number { color: #b5cea8; }
    .keyword { color: #569cd6; font-weight: bold; }
    .function { color: #dcdcaa; }

    textarea {
      width: 100%;
      height: 100px;
      background: #252526;
      color: #dcdcdc;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-family: Consolas, monospace;
    }

    .block-wrapper { padding-right: 60px; }

    #postbutton {
      margin-top: 10px;
      background: #007acc;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    .right { display: flex; flex-direction: column; flex: 1; height: 98vh; }
    .members { color: #2c3943; height: 10vh; display: flex; align-items: center; padding: 10px; gap: 10px; flex-wrap: wrap; }
    .member-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #2c3943;
      color: #e5d4ca;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.1rem;
      user-select: none;
      cursor: pointer;
      position: relative;
    }
    .tooltp {
      visibility: hidden;
      width: 120px;
      background-color: black;
      color: #fff;
      text-align: center;
      border-radius: 6px;
      padding: 5px 0;
      position: absolute;
      z-index: 1;
      top: 150%;
      left: 50%;
      margin-left: -60px;
    }
    .tooltp::after {
      content: "";
      position: absolute;
      bottom: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: transparent transparent black transparent;
    }
    .member-circle:hover .tooltp { visibility: visible; }

    .chat {
      position: fixed;
      bottom: 5px;
      right: 10px;
      background-color: #2c3943;
      color: #9dabb4;
      padding: 20px 150px;
      cursor: pointer;
      font-family: sans-serif;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: background-color 0.3s, opacity 0.3s;
      opacity: 0.4;
      text-align: center;
      height: 20px;
      width: 377px;
    }
    .chat.active { opacity:1; animation: slidein 0.4s forwards; }
    @keyframes slidein { from { height: 20px; } to { height: 81.8vh; } }
    @keyframes slideout { from { height: 81.8vh; } to { height: 20px; } }

    .btn { display: inline-block; }
    .btn button {
      background-color: #2c3943;
      border-bottom-color: #212b33;
      border-bottom-width: 2px;
      color: #9dabb4;
      border-radius: 5px 5px 0 0;
      font-size: larger;
    }
    .btn button.active { background-color: #171e23; color: #9dabb4; }
  </style>
</head>
<body>
  <div class="main">
    <div class="left">
      <div class="icon">
        <h1 style="font-size:65px; color: #e5d4ca">TITLU PROIECT</h1>
        <br>
        <p style="font-size: small; color: #e5d4ca; text-align: center; margin-top: 120px">cod</p>
      </div>
      <div class="workwindow">
        <div id="output"></div>
        <textarea id="input" placeholder="Time to start coding!"></textarea>
        <button id="postbutton" onclick="postText()">Post</button>
      </div>
    </div>

    <div class="right">
      <div class="members">
        <div class="member-circle" title="Alice Wonderland"><span class="tooltp"></span></div>
        <div class="member-circle" title="Bob Ross"><span class="tooltp"></span></div>
        <div class="member-circle" title="Charles Boyle"><span class="tooltp"></span></div>
      </div>
      <br>
      <div class="btn">
        <button class="active" onclick="switchTab('groupchat', this)">Groupchat</button>
        <button onclick="switchTab('ai', this)">AI chat</button>
      </div>
      <div class="chat">
        <div id="tab-groupchat">human</div>
        <div id="tab-ai" style="display:none">AI</div>
      </div>
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ---------------- CHAT BOX ---------------- */
  const chatBox = document.querySelector('.chat');
  let isOpen = false;
  chatBox.addEventListener('click', function () {
    if (!isOpen) {
      this.classList.add('active');
      this.style.animation = 'slidein 0.4s forwards';
    } else {
      this.style.animation = 'slideout 0.4s forwards';
      this.classList.remove('active');
    }
    isOpen = !isOpen;
  });

  /* ---------------- MEMBER INITIALS ---------------- */
  document.querySelectorAll(".member-circle").forEach(circle => {
    const name = circle.getAttribute("title");
    const initials = name.split(" ").map(w => w[0]).join("");
    circle.childNodes[0].textContent = initials;
    circle.querySelector(".tooltp").textContent = name;
  });

});

/* ---------------- SYNTAX HIGHLIGHTER ---------------- */
function syntaxHighlight(text) {
  text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  const placeholders = [];
  let i = 0;
  function protect(regex, cls) {
    text = text.replace(regex, match => {
      const key = `___PLACEHOLDER_${i++}___`;
      placeholders.push({ key, value: `<span class="${cls}">${match}</span>` });
      return key;
    });
  }

  // protect comments and strings first
  protect(/(\/\*[\s\S]*?\*\/)/g, "comment");
  protect(/(\/\/[^\n]*)/g, "comment");
  protect(/(["'`])(?:\\.|(?!\1)[^\\])*\1/g, "string");

  // then numbers, keywords, functions
  text = text.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="number">$1</span>');
  text = text.replace(/\b(function|return|let|const|var|if|else|for|while|class|new|this)\b/g,
                      '<span class="keyword">$1</span>');
  text = text.replace(/(\b[a-zA-Z_]\w*)(?=\s*\()/g, '<span class="function">$1</span>');

  // restore placeholders
  placeholders.forEach(p => { text = text.replace(p.key, p.value); });

  return text;
}

/* ---------------- POST FUNCTION ---------------- */
function postText() {
  const input = document.getElementById("input");
  const output = document.getElementById("output");
  const code = input.value.trim();
  if (!code) return;

  const id = "block-" + Date.now();
  const block = document.createElement("pre");
  block.id = id;
  block.innerHTML = syntaxHighlight(code);

  const editBtn = document.createElement("button");
  editBtn.textContent = "Edit";
  editBtn.onclick = () => editText(id);

  const wrapper = document.createElement("div");
  wrapper.className = "block-wrapper";
  wrapper.appendChild(block);
  wrapper.appendChild(editBtn);

  output.appendChild(wrapper);
  input.value = "";
}

/* ---------------- EDIT FUNCTION ---------------- */
function editText(id) {
  const input = document.getElementById("input");
  const block = document.getElementById(id);
  input.value = block.textContent || block.innerText;
  input.dataset.editingId = id;
  input.placeholder = "Editing...";
  input.focus();
}

/* ---------------- TAB SWITCHER ---------------- */
function switchTab(tab, clickedBtn) {
  document.getElementById("tab-groupchat").style.display = tab === "groupchat" ? "block" : "none";
  document.getElementById("tab-ai").style.display = tab === "ai" ? "block" : "none";
  document.querySelectorAll(".btn button").forEach(btn => btn.classList.remove("active"));
  clickedBtn.classList.add("active");
}
</script>
</body>
</html>
